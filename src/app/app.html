<style>
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  height: 72px;
  background: linear-gradient(135deg, #1e3a5f, #2563eb);
  box-shadow: 0 3px 20px rgba(0,0,0,0.25);
}

/* Logo */
.nav-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  text-decoration: none;
}
.logo-icon { font-size: 2.2rem; }
.logo-text { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
.logo-text .accent { color: #f59e0b; }

/* Nav Links */
.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-links a {
  color: rgba(255,255,255,0.92);
  text-decoration: none;
  font-size: 1.05rem;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 10px;
  transition: background 0.2s, color 0.2s;
  letter-spacing: 0.2px;
}
.nav-links a:hover {
  background: rgba(255,255,255,0.18);
  color: #ffffff;
}

/* Register button */
.btn-register {
  background: rgba(255,255,255,0.15) !important;
  border: 2px solid rgba(255,255,255,0.5) !important;
  border-radius: 25px !important;
  font-weight: 700 !important;
  padding: 9px 22px !important;
}
.btn-register:hover {
  background: rgba(255,255,255,0.28) !important;
}

/* Username chip */
.nav-username {
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  background: rgba(255,255,255,0.18);
  padding: 9px 18px;
  border-radius: 25px;
  letter-spacing: 0.2px;
}

/* Logout button */
.btn-logout {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 25px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  letter-spacing: 0.2px;
}
.btn-logout:hover {
  opacity: 0.88;
  transform: scale(1.04);
}

/* Page content pushed below navbar */
.page-content { padding-top: 72px; }
</style>

<nav class="navbar">
  <div class="nav-brand" routerLink="/">
    <span class="logo-icon">🚌</span>
    <span class="logo-text">BusGo<span class="accent">Pro</span></span>
  </div>

  <div class="nav-links">
    <a routerLink="/">Home</a>

    <!-- Not logged in -->
    <ng-container *ngIf="!isLoggedIn">
      <a routerLink="/login">Login</a>
      <a routerLink="/register" class="btn-register">Register</a>
    </ng-container>

    <!-- Logged in -->
    <ng-container *ngIf="isLoggedIn">
      <a routerLink="/my-bookings">🎫 My Bookings</a>
      <span class="nav-username">👤 {{ userName }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </ng-container>

    <a routerLink="/admin">Admin</a>
  </div>
</nav>

<div class="page-content">
  <router-outlet></router-outlet>
</div>
