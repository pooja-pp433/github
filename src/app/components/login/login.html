<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">🚌</div>
    <h2>Welcome Back!</h2>
    <p class="auth-sub">Login to your BusGoPro account</p>

    <div class="error-msg" *ngIf="error">⚠️ {{ error }}</div>

    <!-- ✅ autocomplete="off" → browser purani email/password fill nahi karega -->
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span>📧</span>
        <input
          type="email"
          placeholder="Enter your email"
          [(ngModel)]="form.email"
          autocomplete="off"
        />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span>🔒</span>
        <input
          type="password"
          placeholder="Enter your password"
          [(ngModel)]="form.password"
          autocomplete="new-password"
        />
      </div>
    </div>

    <button class="auth-btn" (click)="login()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login →' }}
    </button>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>

  </div>
</div>
