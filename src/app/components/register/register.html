<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">🚌</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join BusGoPro — Travel Smart!</p>

    <div class="error-msg" *ngIf="error">⚠️ {{ error }}</div>
    <div class="success-msg" *ngIf="success">✅ {{ success }}</div>

    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrap">
        <span>👤</span>
        <input type="text" placeholder="Enter your name" [(ngModel)]="form.name" />
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <span>📧</span>
        <input type="email" placeholder="Enter your email" [(ngModel)]="form.email" />
      </div>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <div class="input-wrap">
        <span>📱</span>
        <input type="tel" placeholder="Enter your phone" [(ngModel)]="form.phone" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span>🔒</span>
        <input type="password" placeholder="Create password" [(ngModel)]="form.password" />
      </div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <span>🔒</span>
        <input type="password" placeholder="Confirm password" [(ngModel)]="form.confirmPassword" />
      </div>
    </div>

    <button class="auth-btn" (click)="register()" [disabled]="loading">
      {{ loading ? 'Creating Account...' : 'Register →' }}
    </button>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>

  </div>
</div>
